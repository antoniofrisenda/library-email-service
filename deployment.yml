apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: email-service
          image: 192.168.1.10:5000/email-service:latest
          env:
            - name: AWS_REGION
              value: "eu-west-1"
            - name: AWS_SQS_QUEUE_URL
              value: ""
          ports:
            - containerPort: 5000